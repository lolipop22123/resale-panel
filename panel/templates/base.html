<!DOCTYPE html>
<html lang="ru" data-bs-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resale CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
    <div class="wrapper">
        {% if session.get('user_id') %}
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-rocket text-primary fs-3 me-2"></i>
                <span class="fs-4 fw-bold">Resale CRM</span>
            </div>

            <div class="mt-4">
                <a href="{{ url_for('user_home') }}" class="nav-link-custom {% if request.endpoint == 'user_home' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i> Главная
                </a>
                <a href="{{ url_for('user_accounts') }}" class="nav-link-custom {% if request.endpoint == 'user_accounts' %}active{% endif %}">
                    <i class="fa-solid fa-users"></i> Аккаунты
                </a>
                <a href="#" class="nav-link-custom">
                    <i class="fa-solid fa-chart-line"></i> Статистика
                </a>
                <a href="#" class="nav-link-custom">
                    <i class="fa-solid fa-gear"></i> Настройки
                </a>
            </div>

            <div class="position-absolute bottom-0 w-100 p-3">
                <div class="d-flex align-items-center p-2 rounded bg-dark-subtle">
                    <div class="flex-grow-1">
                        <div class="small fw-bold">{{ session.get('user_id') }}</div>
                        <div class="small text-muted">Online</div>
                    </div>
                    <a href="{{ url_for('logout') }}" class="text-danger">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </a>
                </div>
            </div>
        </nav>
        {% endif %}

        <!-- Main Content -->
        <div id="content" {% if not session.get('user_id') %}style="margin-left: 0;"{% endif %}>
            <header id="top-header" class="d-flex justify-content-between align-items-center">
                <h4 class="mb-0 fw-semibold">{% block header_title %}Панель управления{% endblock %}</h4>
                
                <div class="d-flex align-items-center gap-3">
                    <!-- Theme Switcher -->
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center border-0"
                                id="bd-theme" type="button" data-bs-toggle="dropdown">
                            <i class="theme-icon-active fa-solid fa-circle-half-stroke"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li><button type="button" class="dropdown-item" data-bs-theme-value="light"><i class="fa-solid fa-sun me-2"></i>Светлая</button></li>
                            <li><button type="button" class="dropdown-item" data-bs-theme-value="dark"><i class="fa-solid fa-moon me-2"></i>Темная</button></li>
                            <li><button type="button" class="dropdown-item" data-bs-theme-value="auto"><i class="fa-solid fa-circle-half-stroke me-2"></i>Авто</button></li>
                        </ul>
                    </div>
                    {% if not session.get('user_id') %}
                        <a href="{{ url_for('login') }}" class="btn btn-primary btn-sm px-4 rounded-pill">Вход</a>
                    {% endif %}
                </div>
            </header>

            <main class="p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sidebar toggle for mobile
        document.querySelector('.navbar-toggler')?.addEventListener('click', () => {
            document.querySelector('#sidebar').classList.toggle('active');
        });
    </script>
</body>
</html>
